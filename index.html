<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSU - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-box">
        <div class="login-logo">
            <img src="wsu.png" alt="WSU logo">
        </div>
        <div class="login-uni-name">Wolaita Sodo University</div>
        <div class="login-uni-sub">Student Result Viewing System</div>
        <div class="divider"></div>
        <label for="student-id">Student ID Number</label>
        <input type="text" id="student-id" placeholder="e.g. ugr/100773/17">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <a href="home.html" class="btn-login">Log In</a>
    </div>

</body>
</html>
